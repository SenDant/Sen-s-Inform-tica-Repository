<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Music Box
        </title>
        <link href="style.css" rel="stylesheet"/>
        <script src="script.js"></script>
    </head>
    <body>
        <h1>Music Box!</h1>
        <div class="boxes">
        <div id="kick" class="instrument">
            <h2>A</h2>
            <p>kick</p>
        </div>
        <div id="clap" class="instrument">
            <h2>S</h2>
            <p>clap</p>
        </div>
         <div id="cowbell" class="instrument">
            <h2>D</h2>
            <p>cowbell</p>
        </div>
         <div id="hihat" class="instrument">
            <h2>F</h2>
            <p>hihat</p>
        </div>
        </div>
        <br><br><br>
        <div class="boxes">
         <div id="openhat" class="instrument">
            <h2>G</h2>
            <p>openhat</p>
        </div>
         <div id="snare" class="instrument">
            <h2>H</h2>
            <p>snare</p>
        </div>
         <div id="tom" class="instrument">
            <h2>J</h2>
            <p>tom</p>
        </div>
         <div id="yuh" class="instrument">
            <h2>K</h2>
            <p>yuh</p>
        </div>
        </div>
    </body>
</html>
