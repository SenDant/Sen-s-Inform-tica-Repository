<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            HTML Form
        </title>
    </head>
    <body>
        <img src="https://files.mormonsud.org/wp-content/uploads/2021/10/FSY-300x169.jpg">
        <h1>Welcome to For the Strength of Youth Conferences</h1>
        <p>For the Strength of Youth (FSY) conferences help to strengthen faith in Jesus Christ and His restored gospel, feel an increased sense of belonging, and be empowered to continue having spiritual experiences at home.</p>
        <a href="https://www.churchofjesuschrist.org/youth/childrenandyouth/fsy/?lang=eng" target="_blank">FSY Website</a>

       <form>
    <label for="mrn">Enter your Membership Record Number(MRN): </label>
    <input type="text" name="mrn"  required>
    <br>

    <label for="firstname">First name: </label>
    <input type="text" name="firstname"  required>
    <br>

    <label for="lastname">Last name: </label>
    <input type="text" name="lastname"  required>
    <br>

    <label for="sex">Sex:</label>
    <input type="radio" name="sex" value="Female"><span>Male</span>
    <input type="radio" name="sex" value="Male"><span>Female</span>
    <br>

    <label for="email">Email of your parent or tutor: </label>
    <input type="email" name="email"  required>
    <br>

    <label for="pn">Enter the phone number of your parent or tutor: </label>
    <input type="text" name="pn"  required>
    <br>

    <input type="submit" value="Next">
</form>
    </body>
</html>
